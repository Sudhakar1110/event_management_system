<div style="max-width:600px;margin:0 auto;font-family:'Inter',sans-serif;">
    <div style="background:linear-gradient(135deg,#3b82f6,#2563eb);padding:32px;text-align:center;border-radius:12px 12px 0 0;">
        <h1 style="color:white;margin:0;font-size:24px;">Upcoming Event Reminder</h1>
    </div>
    <div style="background:#f9fafb;padding:32px;border:1px solid #e5e7eb;">
        <p>This is a reminder that you have an upcoming event.</p>
        <table style="width:100%;border-collapse:collapse;">
            <tr><td style="padding:8px;border-bottom:1px solid #e5e7eb;"><strong>Booking</strong></td><td style="padding:8px;border-bottom:1px solid #e5e7eb;">{{ booking_title }}</td></tr>
            <tr><td style="padding:8px;border-bottom:1px solid #e5e7eb;"><strong>Event Date</strong></td><td style="padding:8px;border-bottom:1px solid #e5e7eb;">{{ event_date }}</td></tr>
            <tr><td style="padding:8px;border-bottom:1px solid #e5e7eb;"><strong>Customer</strong></td><td style="padding:8px;border-bottom:1px solid #e5e7eb;">{{ customer }}</td></tr>
        </table>
        <p style="margin-top:24px;"><a href="/vendor-dashboard" style="background:#3b82f6;color:white;padding:12px 24px;border-radius:8px;text-decoration:none;">View Dashboard</a></p>
    </div>
</div>
