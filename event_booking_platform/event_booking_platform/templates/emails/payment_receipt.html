<div style="max-width:600px;margin:0 auto;font-family:'Inter',sans-serif;">
    <div style="background:linear-gradient(135deg,#059669,#047857);padding:32px;text-align:center;border-radius:12px 12px 0 0;">
        <h1 style="color:white;margin:0;font-size:24px;">Payment Received</h1>
    </div>
    <div style="background:#f9fafb;padding:32px;border:1px solid #e5e7eb;">
        <p>We have received your payment.</p>
        <table style="width:100%;border-collapse:collapse;">
            <tr><td style="padding:8px;border-bottom:1px solid #e5e7eb;"><strong>Payment ID</strong></td><td style="padding:8px;border-bottom:1px solid #e5e7eb;">{{ doc.name }}</td></tr>
            <tr><td style="padding:8px;border-bottom:1px solid #e5e7eb;"><strong>Booking</strong></td><td style="padding:8px;border-bottom:1px solid #e5e7eb;">{{ doc.booking }}</td></tr>
            <tr><td style="padding:8px;border-bottom:1px solid #e5e7eb;"><strong>Amount</strong></td><td style="padding:8px;border-bottom:1px solid #e5e7eb;">₹{{ '{:,.2f}'.format(doc.amount) }}</td></tr>
            <tr><td style="padding:8px;border-bottom:1px solid #e5e7eb;"><strong>Mode</strong></td><td style="padding:8px;border-bottom:1px solid #e5e7eb;">{{ doc.payment_mode }}</td></tr>
            <tr><td style="padding:8px;border-bottom:1px solid #e5e7eb;"><strong>Transaction ID</strong></td><td style="padding:8px;border-bottom:1px solid #e5e7eb;">{{ doc.transaction_id or 'N/A' }}</td></tr>
        </table>
    </div>
</div>
